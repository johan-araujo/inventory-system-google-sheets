<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 15px; color: #333; }
      h3 { color: #2c3e50; border-bottom: 2px solid #34495e; padding-bottom: 5px; }
      table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
      th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
      th { background-color: #f2f2f2; font-weight: bold; }
      .container-btn { display: flex; justify-content: flex-end; gap: 10px; }
      button { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
      .btn-confirmar { background-color: #2ecc71; color: white; }
      .btn-confirmar:hover { background-color: #27ae60; }
      .btn-cancelar { background-color: #e74c3c; color: white; }
      .btn-cancelar:hover { background-color: #c0392b; }
      .loading { color: #7f8c8d; font-style: italic; display: none; }
    </style>
  </head>
  <body>
    <h3>Resumen de productos a descargar:</h3>
    
    <table>
      <thead>
        <tr>
          <th>Producto</th>
          <th>Cantidad a vender</th>
        </tr>
      </thead>
      <tbody>
        <? for (var i = 0; i < productos.length; i++) { ?>
          <tr>
            <td><?= productos[i].producto ?></td>
            <td><?= productos[i].cantidad ?></td>
          </tr>
        <? } ?>
      </tbody>
    </table>

    <div class="container-btn">
      <span id="txtCargando" class="loading">Procesando inventario...</span>
      <button id="btnCancelar" class="btn-cancelar" onclick="cerrarVentana()">Cancelar</button>
      <button id="btnConfirmar" class="btn-confirmar" onclick="enviarDatos()">Confirmar Venta</button>
    </div>

    <script>
      function cerrarVentana() {
        google.script.host.close();
      }

      function enviarDatos() {
        // Deshabilitar botones para evitar doble clic accidental
        document.getElementById("btnConfirmar").disabled = true;
        document.getElementById("btnCancelar").disabled = true;
        document.getElementById("txtCargando").style.display = "inline";

        // Llamamos a la función final en Código.gs
        google.script.run
          .withSuccessHandler(function() {
             // Cuando termine con éxito, cierra automáticamente la ventana modal
             google.script.host.close();
          })
          .withFailureHandler(function(error) {
             alert("Ocurrió un error en el servidor: " + error.message);
             document.getElementById("btnConfirmar").disabled = false;
             document.getElementById("btnCancelar").disabled = false;
             document.getElementById("txtCargando").style.display = "none";
          })
          .ejecutarActualizacionStock();
      }
    </script>
  </body>
</html>
